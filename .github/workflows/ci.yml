name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The rule engine, analyzer fusion, and calibration metrics are torch-free,
      # so CI runs the full suite against the heuristic classifier — fast, no model.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --cov=scam_spotter --cov-report=term-missing

      - name: Verify CLI entry point
        run: |
          python -m scam_spotter --help
          python -m scam_spotter scan --no-ml "verify your OTP now at http://bit.ly/x" --json
